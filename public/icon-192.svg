      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Cross -->
  <rect x="86" y="28" width="20" height="72" rx="4" fill="url(#gold)"/>
  <rect x="68" y="46" width="56" height="18" rx="4" fill="url(#gold)"/>
  <!-- Rosary beads circle -->
  <circle cx="96" cy="130" r="36" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <!-- Beads on circle -->
  <circle cx="96" cy="94" r="6" fill="#fbbf24"/>
  <circle cx="126" cy="106" r="6" fill="#fbbf24"/>
  <circle cx="130" cy="134" r="6" fill="#fbbf24"/>
  <circle cx="114" cy="158" r="6" fill="#fbbf24"/>
  <circle cx="78" cy="158" r="6" fill="#fbbf24"/>
  <circle cx="62" cy="134" r="6" fill="#fbbf24"/>
  <circle cx="66" cy="106" r="6" fill="#fbbf24"/>
  <!-- Center medal -->
  <circle cx="96" cy="130" r="10" fill="#d97706" stroke="#fbbf24" stroke-width="2"/>
  <text x="96" y="135" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold">M</text>
