<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Cross (centered in safe zone) -->
  <rect x="236" y="90" width="40" height="140" rx="8" fill="url(#gold)"/>
  <rect x="196" y="126" width="120" height="36" rx="8" fill="url(#gold)"/>
  <!-- Rosary beads circle -->
  <circle cx="256" cy="330" r="80" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <!-- Beads on circle -->
  <circle cx="256" cy="250" r="13" fill="#fbbf24"/>
  <circle cx="320" cy="276" r="13" fill="#fbbf24"/>
  <circle cx="332" cy="340" r="13" fill="#fbbf24"/>
  <circle cx="298" cy="396" r="13" fill="#fbbf24"/>
  <circle cx="214" cy="396" r="13" fill="#fbbf24"/>
  <circle cx="180" cy="340" r="13" fill="#fbbf24"/>
  <circle cx="192" cy="276" r="13" fill="#fbbf24"/>
  <!-- Center medal -->
  <circle cx="256" cy="330" r="22" fill="#d97706" stroke="#fbbf24" stroke-width="3"/>
  <text x="256" y="339" text-anchor="middle" fill="#1e1b4b" font-size="26" font-weight="bold">M</text>
</svg>
