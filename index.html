<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Holy Rosary Prayer App</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="A beautiful offline Rosary prayer companion with Bible verses, mystery reflections, and customizable prayers." />
    <meta name="theme-color" content="#312e81" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rosary" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('✅ Service Worker registered:', reg.scope);
            })
            .catch((err) => {
              console.log('❌ Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
